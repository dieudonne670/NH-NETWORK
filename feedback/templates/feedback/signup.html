{% load static %}
<!Doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Network enhancer</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <!-- Link to the CSS file -->
    <link rel="stylesheet" href="{% static 'feedback/main.css/style.css' %}">

<style>
/* Your same styles here */
header {
    background-color: #004080;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
}
.header-1 {
    list-style: none;
    display: flex;
    gap: 20px;
}
.header-1 li {
    display: inline;
}
.header-1 a {
    text-decoration: none;
    color: #fff;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 5px;
    transition: background-color 0.3s ease;
}
.header-1 a:hover,
.header-1 a.active {
    background-color: #0066cc;
}


/* Logo */
.logo {
    width: 100px;
    height: 80px;
    margin-right: 5px;
}
.bottle{
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    max-width: 1150px;
    padding: 80px;
    margin-right: 80px;
    padding: 30px;
    border-radius: 10px;
    color: white;
}
.signup-form h2{
    text-align: center;
    margin-bottom: 20px;
	color: blue;
}
.signup-form label{
    display: block;
    margin-bottom: 5px;
    font-size: 14px;
	color: blue;
}
.signup-form input[type="text"],
.signup-form input[type="email"],
.signup-form input[type="password"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: none;
    font-size: 14px;
    height: 30px;
    border-radius: 8px;
	color: #004080;
}
#username-1{
    width: 100%;
}
.password-wrapper{
    position: relative;
}
.password-wrapper input {
    padding-right: 40px;
}
.toggle-password{
    position: absolute;
    right: 15px;
    top: 13px;
    cursor: pointer;
}
.terms{
    display: flex;
    align-items: center;
    font-size: 14px;
    margin-bottom: 20px;
}
.terms a {
    color: BLUE;
    text-decoration: underline;
}
.signup-form button{
    width: 107%;
    background-color: #7e29f2;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}
.login-link {
    margin-top: 20px;
    text-align: center;
    font-size: 14px;
	color: #004080;
}
.login-link a {
    color: blue;
    text-decoration: underline;
}
</style>
</head>

<body>

<header>
    <a><img class="logo" src="{% static 'feedback/images/logo2.png' %}" alt="Logo"></a>
    <div>
        <nav class="header-1">
            <li><a href="{% url 'index' %}">HOME</a></li> 
            <li><a class="active" href="{% url 'signup' %}">SIGNUP</a></li>  
            <li><a class="nh-network">NH-NETWORK</a></li>
            <li><a href="{% url 'login' %}">LOGIN</a></li>
            <li><a href="{% url 'about' %}">ABOUT</a></li>
        </nav>
    </div>
</header>

<div class="bottle">
<form class="signup-form" method="POST" action="{% url 'signup' %}">
    {% csrf_token %}
    <h2>Sign Up</h2>

    <label for="username">Username</label>
    <input type="text" id="username-1" name="username" placeholder="Choose a Username" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="Enter email address" required>

    <label for="password">Password</label>
    <div class="password-wrapper">
        <input type="password" id="password" name="password" placeholder="Enter password" required>
        <span class="toggle-password"></span>
    </div>

    <label for="confirm-password">Confirm Password</label>
    <div class="password-wrapper">
        <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirm password" required>
        <span class="toggle-password"></span>
    </div>

    <div class="terms">
        <input type="checkbox" id="term" required>
        <label for="term"> I agree to the NH-network <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label>
    </div>

    <button type="submit">Sign up</button>

    <p class="login-link">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
</form>

{% for message in messages %}
    <p style="color: red">{{ message }}</p>
{% endfor %}
</div>

<footer></footer>

<script src="main.js/script.js"></script>
</body>
</html>
